version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: varalia
      POSTGRES_PASSWORD: varalia
      POSTGRES_DB: varaliaos
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U varalia"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://varalia:varalia@db:5432/varaliaos
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHAT_MODEL: gpt-4o-mini
      EMBED_MODEL: text-embedding-3-small
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
